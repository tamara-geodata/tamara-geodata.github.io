<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Atlante: Alpi APuane</title>
    <style>
        /* RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; /* Impedisce qualsiasi scorrimento */
            background: #0e0e0e; 
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 { 
            position: fixed; 
            top: 10px; 
            left: 20px; 
            color: white; 
            font-size: 18px; 
            z-index: 10; 
        }

        /* CONTENITORE IMMAGINE */
        .atlante-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #atlante-img {
            max-height: 100vh; /* L'immagine non supera mai l'altezza dello schermo */
            max-width: 100vw;  /* L'immagine non supera mai la larghezza dello schermo */
            object-fit: contain; /* Mantiene le proporzioni senza tagliare */
            display: block;
        }

        /* PULSANTI DI NAVIGAZIONE (Invisibili ma cliccabili ai lati) */
        .nav-area {
            position: fixed;
            top: 0;
            height: 100%;
            width: 15%; /* Area cliccabile laterale */
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 2rem;
            transition: background 0.3s;
        }
        .nav-area:hover { background: rgba(255,255,255,0.05); }
        .atl-prev { left: 0; }
        .atl-next { right: 0; }

        /* Rimuove il riquadro blu di selezione/focus */
button, div, img {
    outline: none;
    -webkit-tap-highlight-color: transparent;
}

/* Stile per lo zoom */
#atlante-img {
    max-height: 100vh;
    max-width: 100vw;
    object-fit: contain;
    user-select: none;
    /* Transizione sulla trasparenza */
    transition: opacity 0.15s ease-in-out; 
    opacity: 1;
}

/* Classe per nascondere l'immagine durante il cambio */
.fade-out {
    opacity: 0 !important;
}
/* Classe che attiveremo col click per lo zoom */
.zoomed {
    transform: scale(2.5); /* Ingrandisce di 2.5 volte, regola come preferisci */
    cursor: zoom-out !important;
}

/* Quando l'immagine è zoomata, togliamo i limiti di altezza/larghezza */
#atlante-img.zoomed {
    max-height: none;
    max-width: none;
    width: 250%; /* Regola la percentuale per decidere quanto zoommare */
    cursor: zoom-out;
}

/* Contenitore: deve permettere lo scroll quando l'immagine è grande */
.atlante-wrapper {
    width: 100vw;
    height: 100vh;
    overflow: auto; /* Abilita lo scroll */
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0e0e0e;
}


    </style>
</head>
<body>

    <h1>Atlante: Alpi APuane</h1>

    <div class="atlante-wrapper">
        <div class="nav-area atl-prev"><span>&#10094;</span></div>
        
        <!-- Una sola immagine che viene cambiata dal JS -->
        <img id="atlante-img" src="../images/06_Atlante/10_vette_Alpi_Apuane-01.jpg" alt="Atlante">
        
        <div class="nav-area atl-next"><span>&#10095;</span></div>
    </div>

    <script src="../script/atlante.js"></script>
</body>
</html>
